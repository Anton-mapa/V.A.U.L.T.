<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAULT — Claude Code Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #FEFAF4;
      --bg2:       #F0EAE0;
      --bg3:       #E8DDD0;
      --border:    #E0D6C8;
      --accent:    #2A7A7A;
      --accent2:   #C4614A;
      --accent3:   #D4924A;
      --text:      #1C2E2E;
      --dim:       #5A7070;
      --card:      #FFFFFF;
      --card-bdr:  #EAE3DA;
      --shadow-sm: 0 1px 3px rgba(28,46,46,.06), 0 2px 8px rgba(28,46,46,.04);
      --shadow-md: 0 3px 12px rgba(28,46,46,.10), 0 6px 20px rgba(28,46,46,.05);
      --radius:    6px;
      --ring:      0 0 0 3px rgba(42,122,122,.22);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 13px; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 40px; padding: 0 18px; border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; outline: none; white-space: nowrap; user-select: none;
      transition: background .14s, box-shadow .14s, transform .08s, color .14s, border-color .14s;
    }
    .btn:focus-visible { box-shadow: var(--ring); }
    .btn:active { transform: scale(.97); }
    .btn-default { background: var(--accent); color: #fff; }
    .btn-default:hover { background: #236868; }
    .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-outline:hover { background: rgba(42,122,122,.07); }
    .btn-ghost { background: transparent; color: var(--dim); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: var(--bg2); color: var(--text); }
    .btn-destructive { background: var(--accent2); color: #fff; }
    .btn-destructive:hover { background: #a84e3a; }
    .btn-sm { height: 34px; padding: 0 13px; font-size: 12px; }
    .btn-xs { height: 28px; padding: 0 10px; font-size: 11px; border-radius: 5px; }
    .input-field {
      height: 40px; padding: 0 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      background: var(--card); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .input-field:focus { border-color: var(--accent); box-shadow: var(--ring); }
    .input-field::placeholder { color: var(--dim); opacity: .55; }
    header {
      background: var(--bg2); border-bottom: 1.5px solid var(--border);
      padding: 0 22px; height: 58px;
      display: flex; align-items: center; gap: 18px; flex-shrink: 0;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); letter-spacing: -.01em; line-height: 1; white-space: nowrap; }
    .logo-sub { font-size: 10px; color: var(--dim); font-weight: 400; margin-left: 7px; letter-spacing: .03em; }
    .search-wrap { flex: 1; max-width: 300px; }
    .search-wrap .input-field { width: 100%; height: 36px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 22px; }
    .metric { text-align: right; }
    .metric-val { font-size: 18px; font-weight: 600; color: var(--accent); line-height: 1; }
    .metric-lbl { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: .1em; margin-top: 1px; }
    .header-date { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .workspace { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 300px; background: var(--bg2); border-right: 1.5px solid var(--border);
      flex-shrink: 0; overflow-y: auto; padding: 18px 16px 16px;
      display: flex; flex-direction: column; gap: 22px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .s-title { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .14em; color: var(--dim); margin-bottom: 10px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .cal-nav-btn { background: none; border: none; cursor: pointer; padding: 3px 8px; color: var(--dim); font-size: 13px; border-radius: 4px; transition: background .12s, color .12s; }
    .cal-nav-btn:hover { background: var(--bg3); color: var(--text); }
    .cal-month-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .cal-dow { font-size: 9px; color: var(--dim); padding: 2px 0 6px; text-transform: uppercase; font-weight: 500; }
    .cal-d { font-size: 12px; color: var(--dim); padding: 5px 2px; line-height: 1; border-radius: 50%; }
    .cal-d.today { background: var(--accent); color: #fff; font-weight: 700; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto; border-radius: 50%; }
    .cal-d.has-task { color: var(--accent2); font-weight: 600; }
    .task-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 8px; border-radius: 8px; background: var(--card); border: 1.5px solid var(--card-bdr); margin-bottom: 6px; cursor: pointer; transition: box-shadow .15s; }
    .task-item:hover { box-shadow: var(--shadow-sm); }
    .task-item.done { opacity: .38; }
    .task-item.done .task-title { text-decoration: line-through; }
    .task-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-meta { font-size: 10px; color: var(--dim); margin-top: 3px; }
    .task-badge { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 500; }
    .task-badge.overdue { background: #FEE8E4; color: var(--accent2); }
    .task-badge.today   { background: #E4F2F2; color: var(--accent); }
    .task-badge.soon    { background: #FEF2E4; color: var(--accent3); }
    .task-badge.future  { background: var(--bg3); color: var(--dim); }
    .task-del { font-size: 12px; color: var(--dim); opacity: 0; cursor: pointer; padding: 0 2px; line-height: 1; transition: opacity .1s; }
    .task-item:hover .task-del       { opacity: .4; }
    .task-item:hover .task-del:hover { opacity: 1; color: var(--accent2); }
    .task-empty { font-size: 11.5px; color: var(--dim); text-align: center; padding: 14px 0; opacity: .65; }
    .gcal-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; background: var(--card); border: 1.5px solid var(--card-bdr); }
    .gcal-dot { font-size: 10px; color: var(--border); transition: color .3s; }
    .gcal-dot.connected { color: #4AAA72; }
    .gcal-lbl { font-size: 11px; color: var(--dim); flex: 1; }
    .skills-panel { flex: 1; overflow-y: auto; padding: 20px 20px 14px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .category { margin-bottom: 26px; }
    .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; padding-bottom: 8px; border-bottom: 1.5px solid var(--border); }
    .cat-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .cat-name  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: var(--text); }
    .cat-count { font-size: 10px; color: var(--dim); }
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 9px; }
    .skill-card { background: var(--card); border: 1.5px solid var(--card-bdr); border-radius: 10px; padding: 12px 14px 11px; cursor: pointer; position: relative; overflow: hidden; transition: box-shadow .18s, border-color .18s, transform .12s; box-shadow: var(--shadow-sm); }
    .skill-card::after { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--cat-color, var(--accent)); opacity: 0; transition: opacity .18s; }
    .skill-card:hover { box-shadow: var(--shadow-md); border-color: rgba(42,122,122,.28); transform: translateY(-1px); }
    .skill-card:hover::after { opacity: 1; }
    .skill-card.running { border-color: rgba(42,122,122,.45); box-shadow: 0 0 0 3px rgba(42,122,122,.1); }
    .skill-card.running::after { opacity: 1; animation: bar-pulse 1.5s ease-in-out infinite; }
    @keyframes bar-pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .skill-name { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 3px; line-height: 1.2; }
    .skill-desc { font-size: 10.5px; color: var(--dim); line-height: 1.45; }
    .run-pill { display: inline-flex; align-items: center; gap: 3px; background: var(--accent); color: #fff; font-size: 9.5px; font-weight: 500; padding: 2px 9px; border-radius: 5px; margin-top: 8px; opacity: 0; transition: opacity .15s; }
    .skill-card:hover .run-pill   { opacity: 1; }
    .skill-card.running .run-pill { opacity: 1; background: var(--accent3); }
    .empty-state { color: var(--dim); padding: 48px; text-align: center; opacity: .7; line-height: 1.7; }
    .bottom-panel { flex-shrink: 0; border-top: 1.5px solid var(--border); background: var(--bg2); display: flex; flex-direction: column; }
    .output-panel { height: 156px; display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }
    .output-header { height: 34px; padding: 0 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .out-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .out-dot.active { background: #4AAA72; animation: blink 1.1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .out-title { font-size: 11px; font-weight: 500; color: var(--dim); flex: 1; }
    .out-clear { font-size: 10px; color: var(--dim); cursor: pointer; padding: 3px 8px; border-radius: 4px; transition: background .12s; user-select: none; }
    .out-clear:hover { background: var(--bg3); color: var(--text); }
    .output-body { flex: 1; overflow-y: auto; padding: 0 16px 8px; font-family: 'Consolas','JetBrains Mono',monospace; font-size: 11.5px; line-height: 1.65; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .tline      { color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .tline.cmd  { color: var(--accent); font-weight: 500; }
    .tline.done { color: #3A8A5A; }
    .tline.err  { color: var(--accent2); }
    .tline.dim  { color: var(--dim); }
    .input-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--bg2); }
    .input-bar .input-field { flex: 1; height: 38px; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(28,46,46,.38); z-index: 200; align-items: center; justify-content: center; }
    .overlay.show { display: flex; }
    .dialog { background: var(--card); border: 1.5px solid var(--card-bdr); border-radius: 14px; padding: 24px 26px; width: 420px; box-shadow: 0 10px 48px rgba(28,46,46,.18); }
    .dialog h3 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--accent); margin-bottom: 5px; }
    .dialog p  { color: var(--dim); font-size: 11.5px; margin-bottom: 18px; line-height: 1.55; }
    .dialog label { display: block; font-size: 11px; font-weight: 500; color: var(--dim); text-transform: uppercase; letter-spacing: .09em; margin-bottom: 5px; }
    .dialog .input-field { width: 100%; margin-bottom: 14px; }
    .dialog select { width: 100%; height: 40px; padding: 0 13px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; margin-bottom: 14px; appearance: auto; transition: border-color .15s; }
    .dialog select:focus { border-color: var(--accent); box-shadow: var(--ring); }
    .dialog-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <div><span class="logo">VAULT</span><span class="logo-sub">Claude Code</span></div>
  <div class="search-wrap"><input id="search" type="text" class="input-field" placeholder="Buscar skills…" /></div>
  <div class="header-right">
    <div class="metric"><div class="metric-val" id="cnt-skills">—</div><div class="metric-lbl">Skills</div></div>
    <div class="metric"><div class="metric-val" id="cnt-runs">0</div><div class="metric-lbl">Ejecuciones</div></div>
    <div class="header-date" id="header-date"></div>
  </div>
</header>

<div class="workspace">
  <div class="sidebar">
    <div>
      <div class="s-title">Calendario</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="prevMonth()">◄</button>
        <span class="cal-month-label" id="cal-month"></span>
        <button class="cal-nav-btn" onclick="nextMonth()">►</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;">
      <div class="s-title">Pendientes</div>
      <div id="task-list" style="flex:1"><div class="task-empty">Sin tareas aún</div></div>
      <button class="btn btn-default" style="width:100%;margin-top:8px;" onclick="openTaskDialog()">+ Agregar tarea</button>
    </div>
    <div>
      <div class="s-title">Google Calendar</div>
      <div class="gcal-row">
        <span class="gcal-dot" id="gcal-dot">●</span>
        <span class="gcal-lbl" id="gcal-lbl">No conectado</span>
        <button class="btn btn-xs btn-ghost" onclick="gcalAction()" id="gcal-btn">Conectar</button>
      </div>
    </div>
  </div>
  <div class="skills-panel" id="skills-panel"><div class="empty-state">Cargando skills…</div></div>
</div>

<div class="bottom-panel">
  <div class="output-panel">
    <div class="output-header">
      <div class="out-dot" id="out-dot"></div>
      <span class="out-title" id="out-title">Output</span>
      <span class="out-clear" onclick="clearOutput()">limpiar</span>
    </div>
    <div class="output-body" id="term">
      <div class="tline dim">VAULT listo — ejecutá un skill o escribí un prompt abajo.</div>
    </div>
  </div>
  <div class="input-bar">
    <input type="text" id="prompt-input" class="input-field" placeholder="Escribí un prompt para Claude… (Enter para enviar)" />
    <button class="btn btn-default btn-sm" onclick="sendPrompt()">▶ Enviar</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h3 id="d-name"></h3><p id="d-desc"></p>
    <label>Argumentos (opcional)</label>
    <input id="d-args" type="text" class="input-field" placeholder="ej: https://example.com" />
    <div class="dialog-btns">
      <button class="btn btn-ghost btn-sm" onclick="closeDialog()">Cancelar</button>
      <button class="btn btn-default btn-sm" onclick="confirmRun()">▶ Ejecutar</button>
    </div>
  </div>
</div>

<div class="overlay" id="task-overlay">
  <div class="dialog">
    <h3>Nueva tarea</h3><p>Agregá una tarea, examen o actividad pendiente.</p>
    <label>Título *</label>
    <input id="t-title" type="text" class="input-field" placeholder="ej: Parcial Matemática II" />
    <label>Categoría</label>
    <select id="t-cat">
      <option value="Tarea">📚 Tarea</option>
      <option value="Examen">📝 Examen</option>
      <option value="Actividad">🎯 Actividad</option>
      <option value="Clase">🏫 Clase</option>
      <option value="Otro">📌 Otro</option>
    </select>
    <label>Materia (opcional)</label>
    <input id="t-sub" type="text" class="input-field" placeholder="ej: Física, Historia…" />
    <label>Fecha de entrega / evento</label>
    <input id="t-date" type="date" class="input-field" />
    <div class="dialog-btns">
      <button class="btn btn-ghost btn-sm" onclick="closeTaskDialog()">Cancelar</button>
      <button class="btn btn-default btn-sm" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<script>
const CAT_ORDER  = ['Engineering','Planning','Design','Context','Content','iOS','GStack','Assistant','General'];
const CAT_COLORS = { Engineering:'#2A7A7A',Planning:'#2A5A8A',Design:'#C4614A',Context:'#6B8A3A',Content:'#8A5A2A',iOS:'#2A7A60',GStack:'#7A3A6A',Assistant:'#5A7070',General:'#8A7A5A' };
const TASK_COLORS = { Tarea:'#D4924A',Examen:'#C4614A',Actividad:'#2A7A7A',Clase:'#3D6B4E',Otro:'#8A7A5A' };
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS   = ['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
let allSkills = [], allTasks = [], pending = null;
let runCount  = +localStorage.getItem('vault-runs') || 0;
let calDisplayYear  = new Date().getFullYear();
let calDisplayMonth = new Date().getMonth();
document.getElementById('cnt-runs').textContent = runCount;
(function() {
  const d = new Date();
  const wk = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  document.getElementById('header-date').textContent = `${wk[d.getDay()]} ${d.getDate()} de ${MONTHS[d.getMonth()]}`;
})();
function prevMonth() { calDisplayMonth--; if (calDisplayMonth < 0) { calDisplayMonth = 11; calDisplayYear--; } buildCalendar(); }
function nextMonth() { calDisplayMonth++; if (calDisplayMonth > 11) { calDisplayMonth = 0; calDisplayYear++; } buildCalendar(); }
function buildCalendar() {
  const year = calDisplayYear, month = calDisplayMonth;
  const now  = new Date();
  const today = (now.getFullYear() === year && now.getMonth() === month) ? now.getDate() : -1;
  document.getElementById('cal-month').textContent = `${MONTHS[month]} ${year}`;
  const firstDow  = new Date(year, month, 1).getDay();
  const offset    = (firstDow + 6) % 7;
  const daysInMth = new Date(year, month + 1, 0).getDate();
  const taskDays  = new Set(allTasks.filter(t => !t.done && t.due_date).map(t => {
    const d = new Date(t.due_date + 'T00:00:00');
    return (d.getMonth() === month && d.getFullYear() === year) ? d.getDate() : null;
  }).filter(Boolean));
  let html = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < offset; i++) html += '<div></div>';
  for (let d = 1; d <= daysInMth; d++) {
    let cls = 'cal-d';
    if (d === today)          cls += ' today';
    else if (taskDays.has(d)) cls += ' has-task';
    html += `<div class="${cls}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}
function loadTasks() {
  fetch('/api/tasks').then(r => r.json()).then(data => { allTasks = data; renderTasks(); buildCalendar(); }).catch(() => {});
}
function daysUntil(str) {
  if (!str) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(str + 'T00:00:00') - t) / 86400000);
}
function dueBadge(n) {
  if (n === null) return '';
  if (n < 0)   return `<span class="task-badge overdue">${Math.abs(n)}d vencido</span>`;
  if (n === 0) return '<span class="task-badge today">Hoy</span>';
  if (n === 1) return '<span class="task-badge soon">Mañana</span>';
  if (n <= 4)  return `<span class="task-badge soon">${n}d</span>`;
  return `<span class="task-badge future">${n}d</span>`;
}
function renderTasks() {
  const active = allTasks.filter(t => !t.done).sort((a,b) => {
    if (!a.due_date && !b.due_date) return 0;
    if (!a.due_date) return 1; if (!b.due_date) return -1;
    return a.due_date.localeCompare(b.due_date);
  });
  const shown = [...active.slice(0, 8), ...allTasks.filter(t => t.done).slice(0, 2)];
  const list  = document.getElementById('task-list');
  if (!shown.length) { list.innerHTML = '<div class="task-empty">Sin tareas aún</div>'; return; }
  list.innerHTML = shown.map(t => {
    const color = TASK_COLORS[t.category] || '#8A7A5A';
    const badge = dueBadge(daysUntil(t.due_date));
    const sub   = t.subject ? `${esc(t.subject)} · ` : '';
    return `<div class="task-item${t.done?' done':''}" onclick="toggleTask('${t.id}')">
      <div class="task-dot" style="background:${color}"></div>
      <div class="task-body"><div class="task-title">${esc(t.title)}</div><div class="task-meta">${sub}${badge}</div></div>
      <span class="task-del" onclick="event.stopPropagation();deleteTask('${t.id}')">✕</span>
    </div>`;
  }).join('');
}
function toggleTask(id) {
  const t = allTasks.find(x => x.id === id); if (!t) return;
  fetch(`/api/tasks/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ done: !t.done }) }).then(() => loadTasks());
}
function deleteTask(id) { fetch(`/api/tasks/${id}`, { method:'DELETE' }).then(() => loadTasks()); }
function openTaskDialog() {
  ['t-title','t-sub'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('t-cat').value = 'Tarea';
  document.getElementById('t-date').value = '';
  document.getElementById('task-overlay').classList.add('show');
  setTimeout(() => document.getElementById('t-title').focus(), 80);
}
function closeTaskDialog() { document.getElementById('task-overlay').classList.remove('show'); }
function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { document.getElementById('t-title').focus(); return; }
  fetch('/api/tasks', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title, category: document.getElementById('t-cat').value, subject: document.getElementById('t-sub').value.trim(), due_date: document.getElementById('t-date').value }) }).then(() => { closeTaskDialog(); loadTasks(); });
}
document.getElementById('task-overlay').addEventListener('click', e => { if (e.target === document.getElementById('task-overlay')) closeTaskDialog(); });
document.getElementById('t-title').addEventListener('keydown', e => { if (e.key==='Enter') saveTask(); if (e.key==='Escape') closeTaskDialog(); });
function gcalAction() {
  const btn = document.getElementById('gcal-btn');
  const lbl = document.getElementById('gcal-lbl');
  btn.disabled = true;
  fetch('/api/gcal/status').then(r => r.json()).then(s => {
    if (s.connected) {
      lbl.textContent = 'Sincronizando…';
      return fetch('/api/gcal/sync', { method:'POST' }).then(r => r.json()).then(data => {
        if (data.error) { lbl.textContent = 'Error al sincronizar'; }
        else { lbl.textContent = data.added > 0 ? `+${data.added} importado(s)` : 'Al día'; loadTasks(); setTimeout(() => { lbl.textContent = 'Conectado'; }, 3000); }
        btn.textContent = 'Sincronizar'; btn.disabled = false;
      });
    } else if (s.needs_credentials) {
      lbl.textContent = 'Falta credentials.json'; btn.disabled = false; btn.textContent = 'Ayuda';
      btn.onclick = () => addLine('Descargá credentials.json de Google Cloud Console y copialo a vault-dashboard/', 'dim');
    } else { window.location.href = '/api/gcal/auth'; }
  }).catch(() => { btn.disabled = false; });
}
function initGCalStatus() {
  fetch('/api/gcal/status').then(r => r.json()).then(s => {
    if (s.connected) { document.getElementById('gcal-dot').classList.add('connected'); document.getElementById('gcal-lbl').textContent = 'Conectado'; document.getElementById('gcal-btn').textContent = 'Sincronizar'; }
    else if (s.needs_credentials) { document.getElementById('gcal-lbl').textContent = 'Sin credenciales'; }
  }).catch(() => {});
  if (new URLSearchParams(location.search).get('gcal') === 'connected') {
    document.getElementById('gcal-dot').classList.add('connected');
    document.getElementById('gcal-lbl').textContent = 'Conectado';
    document.getElementById('gcal-btn').textContent = 'Sincronizar';
    history.replaceState({}, '', '/');
  }
}
function renderSkills(skills) {
  const panel = document.getElementById('skills-panel');
  if (!skills.length) { panel.innerHTML = '<div class="empty-state">No se encontraron skills.</div>'; return; }
  const cats = {};
  skills.forEach(s => { (cats[s.category] = cats[s.category] || []).push(s); });
  const order = CAT_ORDER.filter(c => cats[c]);
  Object.keys(cats).forEach(c => { if (!order.includes(c)) order.push(c); });
  panel.innerHTML = order.map(cat => {
    const color = CAT_COLORS[cat] || '#8A7A5A';
    return `<div class="category"><div class="cat-header"><div class="cat-swatch" style="background:${color}"></div><span class="cat-name">${cat}</span><span class="cat-count">${cats[cat].length}</span></div><div class="skills-grid">${cats[cat].map(s => skillCard(s, color)).join('')}</div></div>`;
  }).join('');
}
function skillCard(s, color) {
  const name = esc(s.name), desc = esc(s.description || '');
  return `<div class="skill-card" id="card-${s.name}" style="--cat-color:${color}" onclick="openDialog('${name}','${desc}')"><div class="skill-name">/${s.name}</div><div class="skill-desc">${s.description||''}</div><span class="run-pill">▶ Ejecutar</span></div>`;
}
function esc(str) { return (str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function openDialog(name, desc) {
  pending = { name, desc };
  document.getElementById('d-name').textContent = '/' + name;
  document.getElementById('d-desc').textContent = desc;
  document.getElementById('d-args').value = '';
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('d-args').focus(), 80);
}
function closeDialog() { document.getElementById('overlay').classList.remove('show'); pending = null; }
function confirmRun() { if (!pending) return; const args = document.getElementById('d-args').value.trim(); closeDialog(); runSkill(pending.name, args); }
document.getElementById('d-args').addEventListener('keydown', e => { if (e.key==='Enter') confirmRun(); if (e.key==='Escape') closeDialog(); });
document.getElementById('overlay').addEventListener('click', e => { if (e.target===document.getElementById('overlay')) closeDialog(); });
function streamSSE(url, onLine, onDone, onError) {
  const es = new EventSource(url);
  es.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'output') { msg.text.split('\n').forEach((l,i,a) => { if (i < a.length-1 || l) onLine(l); }); }
    else if (msg.type === 'done') { onDone(msg.code); es.close(); }
    else if (msg.type === 'error') { onError(msg.text); es.close(); }
  };
  es.onerror = () => { onError('Conexión cerrada.'); es.close(); };
  return es;
}
function runSkill(name, args) {
  const dot = document.getElementById('out-dot'), title = document.getElementById('out-title');
  const card = document.getElementById('card-' + name);
  document.getElementById('term').innerHTML = '';
  dot.classList.add('active'); title.textContent = '/' + name + ' — corriendo…';
  if (card) card.classList.add('running');
  addLine(`$ claude -p "/${name}${args?' '+args:''}"`, 'cmd'); addLine('', 'dim');
  streamSSE(
    `/api/run?skill=${encodeURIComponent(name)}&args=${encodeURIComponent(args)}`,
    l => addLine(l, ''),
    code => {
      addLine('', 'dim'); addLine(`✓ Completado (exit ${code})`, code===0?'done':'err');
      dot.classList.remove('active'); title.textContent = '/'+name+' — completado';
      if (card) card.classList.remove('running');
      runCount++; localStorage.setItem('vault-runs', runCount);
      document.getElementById('cnt-runs').textContent = runCount;
    },
    err => { addLine('✗ Error: '+err, 'err'); dot.classList.remove('active'); title.textContent = 'Output'; if (card) card.classList.remove('running'); }
  );
}
function sendPrompt() {
  const input = document.getElementById('prompt-input');
  const text  = input.value.trim(); if (!text) { input.focus(); return; }
  input.value = '';
  const dot = document.getElementById('out-dot'), title = document.getElementById('out-title');
  document.getElementById('term').innerHTML = '';
  dot.classList.add('active'); title.textContent = 'Claude — corriendo…';
  addLine('$ ' + text, 'cmd'); addLine('', 'dim');
  streamSSE(
    `/api/prompt?text=${encodeURIComponent(text)}`,
    l => addLine(l, ''),
    () => {
      addLine('', 'dim'); addLine('✓ Completado', 'done');
      dot.classList.remove('active'); title.textContent = 'Output';
      runCount++; localStorage.setItem('vault-runs', runCount);
      document.getElementById('cnt-runs').textContent = runCount;
    },
    err => { addLine('✗ Error: '+err, 'err'); dot.classList.remove('active'); title.textContent = 'Output'; }
  );
}
document.getElementById('prompt-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
});
function addLine(text, cls) {
  const el = document.createElement('div');
  el.className = 'tline' + (cls ? ' '+cls : '');
  el.textContent = text;
  const term = document.getElementById('term');
  term.appendChild(el); term.scrollTop = term.scrollHeight;
}
function clearOutput() { document.getElementById('term').innerHTML = '<div class="tline dim">Terminal limpiada.</div>'; }
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderSkills(!q ? allSkills : allSkills.filter(s =>
    s.name.toLowerCase().includes(q) || (s.description||'').toLowerCase().includes(q) || s.category.toLowerCase().includes(q)
  ));
});
fetch('/api/skills').then(r => r.json()).then(data => {
  allSkills = data;
  document.getElementById('cnt-skills').textContent = data.length;
  renderSkills(data);
}).catch(() => {
  document.getElementById('skills-panel').innerHTML = '<div class="empty-state">No se pudo conectar con el servidor Flask.<br>Asegurate de correr app.py</div>';
});
loadTasks();
buildCalendar();
initGCalStatus();
</script>
</body>
</html>
